plugins {
    id 'com.android.application'
}

android {
    namespace 'com.tool.devsettings'
    compileSdk 34

    defaultConfig {
        applicationId "com.tool.devsettings"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        release {
            storeFile file("${rootDir}/release-key.jks")
            storePassword "android123"
            keyAlias "release"
            keyPassword "android123"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
